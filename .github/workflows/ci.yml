name: Backend CI

on:
  push:
    paths:
      - "backend-hono/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend-hono/**"
      - ".github/workflows/ci.yml"

jobs:
  backend-env-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend-hono
        run: npm ci

      - name: Build backend
        working-directory: backend-hono
        run: npm run build

      - name: Env validation rejects empty env
        run: |
          set +e
          NODE_ENV=production node -e "import('./dist/boot/index.js').then((m) => m.validateEnv())"
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo "ERROR: boot validation should have exited non-zero with empty env"
            exit 1
          fi
          echo "PASS: validation correctly rejected empty env (exit $STATUS)"
        working-directory: backend-hono
