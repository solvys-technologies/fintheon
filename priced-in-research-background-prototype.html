<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priced In Research Background Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020100;
        --gold: #c79f4a;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
      }
      body {
        min-height: 620vh;
        overflow-x: hidden;
        font-family: "Courier New", ui-monospace, monospace;
      }
      #stage {
        position: fixed;
        inset: 0;
        height: 100svh;
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        filter: contrast(1.26) saturate(0.9) brightness(1.08);
      }
      #dither,
      #scanlines,
      #vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #dither {
        z-index: 2;
        opacity: 0.34;
        background-image:
          radial-gradient(
            circle,
            rgba(199, 159, 74, 0.34) 0 0.8px,
            transparent 1px
          ),
          radial-gradient(
            circle,
            rgba(244, 220, 154, 0.12) 0 0.7px,
            transparent 1px
          );
        background-position:
          0 0,
          3px 3px;
        background-size: 6px 6px;
        mix-blend-mode: screen;
      }
      #scanlines {
        z-index: 3;
        opacity: 0.64;
        background:
          linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.34) 50%),
          linear-gradient(
            90deg,
            rgba(199, 159, 74, 0.05),
            rgba(216, 183, 106, 0.035),
            rgba(92, 132, 168, 0.025)
          );
        background-size:
          100% 4px,
          8px 100%;
        mix-blend-mode: multiply;
      }
      #vignette {
        z-index: 4;
        box-shadow:
          inset 0 0 112px rgba(0, 0, 0, 0.9),
          inset 0 0 30px rgba(0, 0, 0, 0.82);
      }
      .scroll-depth {
        height: 620vh;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="stage" aria-hidden="true"></div>
    <div id="dither" aria-hidden="true"></div>
    <div id="scanlines" aria-hidden="true"></div>
    <div id="vignette" aria-hidden="true"></div>
    <div class="scroll-depth" aria-hidden="true"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
    <script>
      const stage = document.getElementById("stage");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        64,
        innerWidth / innerHeight,
        0.1,
        360,
      );
      const renderer = new THREE.WebGLRenderer({
        antialias: false,
        powerPreference: "high-performance",
      });
      const clock = new THREE.Clock();
      const animatedMaps = [];
      const pointer = new THREE.Vector2();
      let scrollProgress = 0;

      renderer.setClearColor(0x020100, 1);
      renderer.setPixelRatio(0.62);
      renderer.setSize(innerWidth, innerHeight);
      stage.appendChild(renderer.domElement);
      scene.fog = new THREE.FogExp2(0x020100, 0.014);
      camera.position.set(0, 2.0, 21);

      const lenis = new Lenis({
        duration: 1.25,
        smoothWheel: true,
        wheelMultiplier: 0.8,
        touchMultiplier: 0.9,
      });
      lenis.on("scroll", ({ progress }) => {
        scrollProgress = progress;
      });

      function material(color, opacity) {
        return new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
      }

      function makeFacadeTexture(seed, w = 640, h = 1536) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = w;
        canvas.height = h;
        ctx.fillStyle = "#050402";
        ctx.fillRect(0, 0, w, h);

        const towerGlow = ctx.createLinearGradient(0, 0, w, h);
        towerGlow.addColorStop(0, "rgba(216,183,106,0.08)");
        towerGlow.addColorStop(0.45, "rgba(75,108,140,0.06)");
        towerGlow.addColorStop(1, "rgba(199,159,74,0.04)");
        ctx.fillStyle = towerGlow;
        ctx.fillRect(0, 0, w, h);

        for (let y = 18; y < h - 30; y += 30) {
          for (let x = 18; x < w - 34; x += 42) {
            const light = Math.sin(seed * 13 + x * 0.09 + y * 0.041);
            if (light < -0.42) continue;
            const gold = light > 0.36;
            const alpha = gold
              ? 0.34 + light * 0.32
              : 0.13 + Math.abs(light) * 0.15;
            ctx.fillStyle = gold
              ? `rgba(216,183,106,${alpha})`
              : `rgba(112,132,150,${alpha})`;
            ctx.fillRect(x, y, 18 + (seed % 4), 9);
          }
        }

        ctx.strokeStyle = "rgba(199,159,74,0.16)";
        ctx.lineWidth = 1;
        for (let x = 0; x < w; x += 84) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + Math.sin(seed + x) * 28, h);
          ctx.stroke();
        }
        for (let y = 0; y < h; y += 120) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y + Math.sin(seed + y) * 12);
          ctx.stroke();
        }

        ctx.font = "12px Courier New, monospace";
        ctx.fillStyle = "rgba(199,159,74,0.38)";
        const marks = [
          "BRK",
          "SPX",
          "USD",
          "FLOW",
          "YIELD",
          "CLOSE",
          "BID",
          "ASK",
        ];
        for (let y = 52; y < h; y += 180) {
          ctx.fillText(
            marks[(y + seed) % marks.length],
            24 + (seed % 8) * 11,
            y,
          );
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return texture;
      }

      function addTower(side, index) {
        const depth = -index * 12;
        const setback = (index % 4) * 0.7;
        const x = side === -1 ? -8.8 - setback : 8.8 + setback;
        const height = 28 + (index % 7) * 7;
        const width = 5.6 + (index % 5) * 1.1;
        const y = height / 2 - 0.35;
        const map = makeFacadeTexture(index + (side === -1 ? 4 : 50));
        const mat = new THREE.MeshBasicMaterial({
          map,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const tower = new THREE.Mesh(
          new THREE.PlaneGeometry(width, height),
          mat,
        );
        tower.position.set(x, y, depth);
        tower.rotation.y = side === -1 ? Math.PI * 0.5 : -Math.PI * 0.5;
        scene.add(tower);
        animatedMaps.push({ map, rate: 0.006 + (index % 5) * 0.001 });

        const edge = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(width, height, 0.24)),
          new THREE.LineBasicMaterial({
            color: 0xc79f4a,
            transparent: true,
            opacity: 0.28,
            blending: THREE.AdditiveBlending,
          }),
        );
        edge.position.copy(tower.position);
        edge.rotation.copy(tower.rotation);
        scene.add(edge);
      }

      function addRoad() {
        const road = new THREE.Mesh(
          new THREE.PlaneGeometry(9.2, 320),
          new THREE.MeshBasicMaterial({ color: 0x060503 }),
        );
        road.rotation.x = -Math.PI / 2;
        road.position.set(0, -0.04, -125);
        scene.add(road);

        const grid = new THREE.GridHelper(320, 96, 0xc79f4a, 0x3d3014);
        grid.position.y = 0.01;
        grid.position.z = -125;
        grid.material.transparent = true;
        grid.material.opacity = 0.24;
        scene.add(grid);

        const lane = material(0xd8b76a, 0.32);
        for (let z = 16; z > -270; z -= 13) {
          const stripe = new THREE.Mesh(
            new THREE.PlaneGeometry(0.08, 5.2),
            lane,
          );
          stripe.rotation.x = -Math.PI / 2;
          stripe.position.set(0, 0.035, z);
          scene.add(stripe);
        }

        const crosswalk = material(0xd8b76a, 0.2);
        for (let i = -4; i <= 4; i += 1) {
          const slab = new THREE.Mesh(
            new THREE.PlaneGeometry(0.32, 6.8),
            crosswalk,
          );
          slab.rotation.x = -Math.PI / 2;
          slab.rotation.z = Math.PI / 2;
          slab.position.set(i * 0.74, 0.04, -9);
          scene.add(slab);
        }
      }

      function addPalm(x, z, scale = 1) {
        const trunk = new THREE.Mesh(
          new THREE.CylinderGeometry(
            0.07 * scale,
            0.11 * scale,
            4.8 * scale,
            7,
          ),
          material(0xc79f4a, 0.46),
        );
        trunk.position.set(x, 2.2 * scale, z);
        trunk.rotation.z = x < 0 ? -0.1 : 0.1;
        scene.add(trunk);

        const frondMat = material(0xd8b76a, 0.3);
        for (let i = 0; i < 8; i += 1) {
          const frond = new THREE.Mesh(
            new THREE.PlaneGeometry(0.14 * scale, 2.25 * scale),
            frondMat,
          );
          frond.position.set(x, 4.72 * scale, z);
          frond.rotation.z = (i / 8) * Math.PI * 2;
          frond.rotation.x = 0.65;
          frond.rotation.y = x < 0 ? 0.28 : -0.28;
          scene.add(frond);
        }
      }

      function addStreetlight(x, z) {
        const poleMat = material(0xd8b76a, 0.52);
        const pole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.035, 0.045, 5.6, 8),
          poleMat,
        );
        pole.position.set(x, 2.8, z);
        scene.add(pole);

        const arm = new THREE.Mesh(
          new THREE.BoxGeometry(1.4, 0.04, 0.04),
          poleMat,
        );
        arm.position.set(x + (x < 0 ? 0.66 : -0.66), 5.45, z);
        scene.add(arm);

        const light = new THREE.Mesh(
          new THREE.SphereGeometry(0.18, 12, 8),
          material(0xf0ead6, 0.68),
        );
        light.position.set(x + (x < 0 ? 1.34 : -1.34), 5.35, z);
        scene.add(light);
      }

      function addMetromover() {
        const railMat = material(0xc79f4a, 0.2);
        for (let x of [-2.1, 2.1]) {
          const rail = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.08, 250),
            railMat,
          );
          rail.position.set(x, 7.8, -105);
          scene.add(rail);
        }
        for (let z = 4; z > -210; z -= 18) {
          const beam = new THREE.Mesh(
            new THREE.BoxGeometry(5.2, 0.08, 0.12),
            railMat,
          );
          beam.position.set(0, 7.72, z);
          scene.add(beam);
        }
        const car = new THREE.Mesh(
          new THREE.BoxGeometry(2.6, 0.82, 2.8),
          material(0xd8b76a, 0.23),
        );
        car.position.set(0, 7.95, -34);
        scene.add(car);
      }

      function addBayReflections() {
        const waterMat = new THREE.MeshBasicMaterial({
          color: 0x5a7890,
          transparent: true,
          opacity: 0.08,
          blending: THREE.AdditiveBlending,
        });
        const water = new THREE.Mesh(new THREE.PlaneGeometry(8, 210), waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.set(6.9, 0.02, -112);
        scene.add(water);
      }

      function seedScene() {
        addRoad();
        addMetromover();
        addBayReflections();
        for (let i = 0; i < 30; i += 1) {
          addTower(-1, i);
          addTower(1, i + 1);
          if (i % 3 === 0) {
            addPalm(-5.8, -i * 12 + 2, 1 + (i % 2) * 0.08);
            addPalm(5.7, -i * 12 - 4, 0.94);
          }
          if (i % 4 === 0) {
            addStreetlight(-4.5, -i * 12);
            addStreetlight(4.5, -i * 12 - 7);
          }
        }
      }

      function updateCamera(time) {
        const depth = scrollProgress * 190;
        camera.position.x = pointer.x * 0.45 + Math.sin(time * 0.22) * 0.09;
        camera.position.y =
          2.05 + pointer.y * 0.18 + Math.sin(time * 0.55) * 0.04;
        camera.position.z = 21 - depth;
        camera.lookAt(pointer.x * 0.6, 5.6 + pointer.y * 0.2, -31 - depth);
      }

      function animate(time) {
        lenis.raf(time);
        const elapsed = clock.getElapsedTime();
        updateCamera(elapsed);
        animatedMaps.forEach(({ map, rate }, index) => {
          map.offset.y = (elapsed * rate + index * 0.01) % 1;
        });
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      function resize() {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setPixelRatio(0.62);
        renderer.setSize(innerWidth, innerHeight);
      }

      addEventListener("resize", resize);
      addEventListener("pointermove", (event) => {
        pointer.x = (event.clientX / innerWidth - 0.5) * 2;
        pointer.y = -(event.clientY / innerHeight - 0.5) * 2;
      });

      seedScene();
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
