schema_version: 1
id: fintheon.imported.notion
name: Notion (wrapped)
version: 0.1.0
description: >-
  Wraps Notion Zapier MCP integration (page read/create, comments, search).
  Fintheon storage is Supabase-first; this skill is read-heavy only — used for
  reference doc retrieval, not as a source of truth.
entry_point: ./entry.ts
tools:
  - name: notion_search
    description: Full-text search across the connected Notion workspace.
    input_schema:
      query: string
  - name: notion_fetch_page
    description: Retrieve a single Notion page with children blocks.
    input_schema:
      page_id: string
permissions:
  - read_news
  - write_notes
security_scan:
  data_exfil_risks: []
  prompt_injection_vectors: []
  destructive_ops: []
authors:
  - Priced In Capital
license: Proprietary
