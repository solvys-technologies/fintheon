<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Roulette"><title>Roulette</title><desc>A perimeter sweep decelerates and lands on a final answer.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-40-k 2600ms linear 1 both;}@keyframes icon-40-k{0%{opacity:0;}5%{opacity:1;}30%{opacity:0.05;}80%{opacity:0.05;}100%{opacity:0.6;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d00{animation-delay:0ms;}.d01{animation-delay:458ms;}.d02{animation-delay:858ms;}.d03{animation-delay:1205ms;}.d04{animation-delay:1503ms;}.d10{animation-delay:2599ms;}.d14{animation-delay:1755ms;}.d20{animation-delay:2595ms;}.d24{animation-delay:1965ms;}.d30{animation-delay:2583ms;}.d34{animation-delay:2137ms;}.d40{animation-delay:2559ms;}.d41{animation-delay:2521ms;}.d42{animation-delay:2463ms;}.d43{animation-delay:2382ms;}.d44{animation-delay:2275ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d00" href="#l" x="6" y="6"/><use class="l d01" href="#l" x="17" y="6"/><use class="l d02" href="#l" x="28" y="6"/><use class="l d03" href="#l" x="39" y="6"/><use class="l d04" href="#l" x="50" y="6"/><use class="l d10" href="#l" x="6" y="17"/><use cl