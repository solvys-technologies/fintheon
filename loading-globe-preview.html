<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fintheon Loading Globe Preview</title>
  <style>
    :root {
      --primary: #c79f4a;
      --bg: #050402;
      --surface: #0a0905;
      --text: #f0ead6;
      --muted: #6b6455;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); }
    body {
      font-family: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
      color: var(--text);
      letter-spacing: 0;
    }
    #app-shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 50px 1fr;
      opacity: 0;
      transition: opacity 900ms cubic-bezier(0.4, 0, 0.2, 1);
      background:
        linear-gradient(90deg, rgba(199, 159, 74, 0.08), transparent 34%),
        var(--bg);
    }
    #app-shell.ready { opacity: 1; }
    .mock-header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 18px;
      border-bottom: 1px solid color-mix(in srgb, var(--primary) 12%, transparent);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
    }
    .mock-title {
      display: grid;
      gap: 3px;
      min-width: 180px;
    }
    .mock-title strong {
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }
    .mock-title span {
      color: color-mix(in srgb, var(--muted) 72%, var(--text));
      font-size: 9px;
      font-style: italic;
    }
    .mock-rail {
      width: 42px;
      height: calc(100vh - 50px);
      border-right: 1px solid color-mix(in srgb, var(--primary) 10%, transparent);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        var(--bg);
      opacity: 1;
      transition: opacity 900ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #splash.reveal { opacity: 0; pointer-events: none; }
    #splash::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 3px),
        radial-gradient(circle at center, transparent 0 42%, rgba(0,0,0,0.56) 78%);
      mix-blend-mode: screen;
      opacity: 0.28;
      pointer-events: none;
    }
    #stage {
      position: absolute;
      inset: -6vmin;
      transform: scale(1);
      transition: transform 1200ms cubic-bezier(0.16, 1, 0.3, 1), opacity 520ms ease;
    }
    #stage.zoom { transform: scale(1.24); }
    #stage.dim { opacity: 0; }
    canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
    .copy-stack {
      position: relative;
      z-index: 2;
      display: grid;
      justify-items: center;
      align-self: center;
      margin: 0;
      min-width: min(560px, calc(100vw - 36px));
      transition: opacity 520ms ease, transform 900ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .copy-stack.hide {
      opacity: 0;
      transform: translateY(14px);
    }
    .brand {
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
    }
    .greeting {
      min-height: 16px;
      color: color-mix(in srgb, var(--muted) 70%, var(--text));
      font-size: 11px;
      font-style: italic;
      text-align: center;
      max-width: 100%;
      transition: opacity 300ms ease, transform 300ms ease;
    }
    .status-card {
      display: grid;
      gap: 9px;
      justify-items: center;
      min-width: min(300px, calc(100vw - 48px));
      max-width: min(340px, calc(100vw - 48px));
      padding: 13.2px 14px;
      border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 83%, transparent);
      backdrop-filter: blur(18px) saturate(1.18);
      overflow: hidden;
      text-align: center;
    }
    .phrase {
      min-height: 15px;
      color: color-mix(in srgb, var(--primary) 72%, var(--text));
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      line-height: 1.45;
      overflow-wrap: anywhere;
      max-width: 100%;
    }
    .braille {
      display: grid;
      grid-template-columns: repeat(12, 5px);
      grid-template-rows: repeat(2, 5px);
      gap: 3px;
      min-height: 13px;
      justify-content: center;
    }
    .braille i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.16;
      animation: dot 2700ms cubic-bezier(0.16, 1, 0.3, 1) infinite;
      animation-delay: var(--delay, 0ms);
    }
    .controls {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 20;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--surface) 84%, transparent);
      backdrop-filter: blur(12px);
    }
    button {
      min-width: 66px;
      height: 30px;
      border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
      border-radius: 6px;
      color: var(--text);
      background: transparent;
      font: inherit;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
    }
    button:hover, button.active {
      color: #050402;
      background: var(--primary);
    }
    #fade {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 650ms ease;
    }
    #fade.black { opacity: 1; }
    @keyframes dot {
      0%, 38%, 100% { opacity: 0.13; transform: scale(0.78); box-shadow: none; }
      16% { opacity: 0.9; transform: scale(1.08); box-shadow: 0 0 10px color-mix(in srgb, var(--primary) 72%, transparent); }
    }
    @media (max-width: 640px) {
      #stage.zoom { transform: scale(1.34); }
      .copy-stack { margin: 0; }
      .controls { left: 12px; right: 12px; justify-content: center; }
      button { min-width: 58px; }
    }
  </style>
</head>
<body>
  <div id="app-shell" aria-hidden="true">
    <div class="mock-header">
      <div class="mock-title">
        <strong>Fintheon</strong>
        <span id="mockGreeting">The Forum is active.</span>
      </div>
    </div>
    <div class="mock-rail"></div>
  </div>
  <main id="splash" aria-label="Fintheon loading preview">
    <div id="stage"></div>
    <section class="copy-stack" id="copyStack">
      <div class="status-card">
        <div class="brand">Fintheon</div>
        <div class="greeting" id="greeting">The Forum is active.</div>
        <div class="phrase" id="phrase">Initializing Strategium</div>
        <div class="braille" id="braille" aria-hidden="true"></div>
      </div>
    </section>
  </main>
  <div id="fade"></div>
  <nav class="controls" aria-label="Preview controls">
    <button type="button" data-action="idle" class="active">Idle</button>
    <button type="button" data-action="auth">Auth</button>
    <button type="button" data-action="loaded">Loaded</button>
    <button type="button" data-action="replay">Replay</button>
  </nav>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js";

    const presets = {
      "something-solvys": { primary: "#c79f4a", accent: "#c79f4a", bg: "#0d0c09", surface: "#151310", text: "#c38f25", muted: "#6b6455" },
      "something-monochrome": { primary: "#e0e0e0", accent: "#e0e0e0", bg: "#000000", surface: "#0a0a0a", text: "#e0e0e0", muted: "#4a4a4a" },
      "frosted-glass": { primary: "#d7b967", accent: "#d7b967", bg: "#070705", surface: "rgba(18,17,14,0.58)", text: "#f3ead4", muted: "#8a8170" },
      "liquid-glass": { primary: "#f2c94c", accent: "#f2c94c", bg: "#050608", surface: "rgba(13,15,18,0.48)", text: "#f7f2df", muted: "#8f938f" }
    };
    const greetings = ["Ave. The markets stir.", "The Forum is active.", "The day's battles are done."];
    const phrases = ["Initializing Strategium", "Summoning Consilium", "Agents standing by", "The tape is unwinding"];
    const state = { targetSpeed: 1, speed: 1, loaded: false, authPulse: 0, start: performance.now(), previous: performance.now(), nextShot: 0 };
    function readTheme() {
      try {
        const key = localStorage.getItem("fintheon:theme");
        if (key === "custom") return JSON.parse(localStorage.getItem("fintheon:theme-custom") || "{}");
        if (key && presets[key]) return presets[key];
      } catch {}
      return presets["something-solvys"];
    }
    function applyTheme() {
      const theme = readTheme();
      const root = document.documentElement;
      root.style.setProperty("--primary", theme.primary || theme.accent || "#c79f4a");
      root.style.setProperty("--bg", theme.bg || "#050402");
      root.style.setProperty("--surface", theme.surface || "#0a0905");
      root.style.setProperty("--text", theme.text || "#f0ead6");
      root.style.setProperty("--muted", theme.muted || "#6b6455");
      return new THREE.Color(theme.primary || theme.accent || "#c79f4a");
    }
    const primaryColor = applyTheme();
    const stage = document.getElementById("stage");
    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(stage.clientWidth, stage.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    stage.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, stage.clientWidth / stage.clientHeight, 0.1, 80);
    camera.position.set(0, 0, 4.3);
    const starGold = new THREE.Color("#d3ad52").lerp(primaryColor, 0.34);
    const globe = new THREE.Group();
    scene.add(globe);
    const globeBody = new THREE.Mesh(
      new THREE.SphereGeometry(0.92, 64, 32),
      new THREE.MeshBasicMaterial({
        color: new THREE.Color(getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || "#050402"),
        transparent: true,
        opacity: 0.3,
        depthWrite: true
      })
    );
    globeBody.renderOrder = -1;
    globe.add(globeBody);
    const countryFillLayer = new THREE.Group();
    const countryLayer = new THREE.Group();
    const shotLayer = new THREE.Group();
    globe.add(countryFillLayer);
    globe.add(countryLayer);
    globe.add(shotLayer);
    const activeShots = [];
    const maxBeamAngle = 1.92;
    const beamTargets = [
      { name: "Strait of Hormuz / Iran", lon: 56.3, lat: 26.5, jitter: 2.1 },
      { name: "Israel", lon: 35.2, lat: 31.8, jitter: 0.9 },
      { name: "China", lon: 116.4, lat: 39.9, jitter: 1.7 },
      { name: "Japan", lon: 139.7, lat: 35.7, jitter: 1.5 },
      { name: "Koreas", lon: 127.1, lat: 37.7, jitter: 1.2 },
      { name: "USA", lon: -73.4, lat: 39.1, jitter: 2.4 },
      { name: "Venezuela", lon: -66.9, lat: 10.5, jitter: 1.7 },
      { name: "Mexico", lon: -99.1, lat: 19.4, jitter: 1.8 },
      { name: "Russia", lon: 37.6, lat: 55.8, jitter: 2.4 },
      { name: "EU cluster", lon: 4.4, lat: 50.8, jitter: 2.2 },
      { name: "London", lon: -0.1, lat: 51.5, jitter: 1.0 }
    ];

    function makePoints(count, radius, jitter) {
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const golden = Math.PI * (3 - Math.sqrt(5));
      for (let i = 0; i < count; i++) {
        const y = 1 - (i / (count - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const theta = golden * i;
        const shade = 0.38 + ((i * 37) % 100) / 155;
        positions[i * 3] = Math.cos(theta) * r * (radius + Math.sin(i * 0.37) * jitter);
        positions[i * 3 + 1] = y * (radius + Math.cos(i * 0.19) * jitter);
        positions[i * 3 + 2] = Math.sin(theta) * r * (radius + Math.cos(i * 0.41) * jitter);
        colors[i * 3] = primaryColor.r * shade;
        colors[i * 3 + 1] = primaryColor.g * shade;
        colors[i * 3 + 2] = primaryColor.b * shade;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      return geometry;
    }
    function makeLatitude(y) {
      const points = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        const radius = Math.sqrt(1 - y * y);
        points.push(new THREE.Vector3(Math.cos(a) * radius, y, Math.sin(a) * radius));
      }
      return new THREE.BufferGeometry().setFromPoints(points);
    }
    function makeMeridian(angle) {
      const points = [];
      for (let i = 0; i <= 128; i++) {
        const a = (i / 128) * Math.PI * 2;
        const ring = Math.sin(a);
        points.push(new THREE.Vector3(ring * Math.cos(angle), Math.cos(a), ring * Math.sin(angle)));
      }
      return new THREE.BufferGeometry().setFromPoints(points);
    }
    function starNoise(index) {
      const wave = Math.sin(index * 12.9898 + 78.233) * 43758.5453;
      return wave - Math.floor(wave);
    }
    function makeStarfield(count) {
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      let placed = 0;
      let attempts = 0;
      while (placed < count && attempts < count * 8) {
        const seed = attempts * 4;
        const x = (starNoise(seed) - 0.5) * 8.2;
        const y = (starNoise(seed + 1) - 0.5) * 4.9;
        const z = -2.6 - starNoise(seed + 2) * 4.4;
        attempts += 1;
        if (Math.hypot(x * 0.76, y) < 1.08 && starNoise(seed + 3) < 0.86) continue;
        const flicker = 0.42 + starNoise(seed + 3) * 0.5;
        positions[placed * 3] = x;
        positions[placed * 3 + 1] = y;
        positions[placed * 3 + 2] = z;
        colors[placed * 3] = starGold.r * flicker;
        colors[placed * 3 + 1] = starGold.g * flicker;
        colors[placed * 3 + 2] = starGold.b * flicker;
        placed += 1;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      return geometry;
    }
    function lonLatToVector(lon, lat, radius = 1) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }
    function addCountryRing(coords, material) {
      const points = [];
      for (const coord of coords) {
        if (!Array.isArray(coord) || coord.length < 2) continue;
        points.push(lonLatToVector(coord[0], coord[1], 0.992));
      }
      if (points.length < 2) return;
      countryLayer.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), material));
    }
    function addCountryFillPolygon(polygon, material) {
      if (!Array.isArray(polygon) || polygon.length === 0) return;
      const rings = polygon
        .map((ring) => ring.filter((coord) => Array.isArray(coord) && coord.length >= 2))
        .filter((ring) => ring.length >= 3);
      if (rings.length === 0) return;
      const outer = rings[0].map((coord) => new THREE.Vector2(coord[0], coord[1]));
      const holes = rings.slice(1).map((ring) => ring.map((coord) => new THREE.Vector2(coord[0], coord[1])));
      const coords = rings.flat();
      const triangles = THREE.ShapeUtils.triangulateShape(outer, holes);
      if (!triangles.length) return;
      const positions = [];
      for (const triangle of triangles) {
        for (const index of triangle) {
          const coord = coords[index];
          const point = lonLatToVector(coord[0], coord[1], 0.987);
          positions.push(point.x, point.y, point.z);
        }
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      countryFillLayer.add(new THREE.Mesh(geometry, material));
    }
    function drawCountryGeometry(geometry, outlineMaterial, fillMaterial) {
      if (geometry?.type === "Polygon") {
        addCountryFillPolygon(geometry.coordinates, fillMaterial);
        geometry.coordinates.forEach((ring) => addCountryRing(ring, outlineMaterial));
        return;
      }
      if (geometry?.type === "MultiPolygon") {
        geometry.coordinates.forEach((polygon) => {
          addCountryFillPolygon(polygon, fillMaterial);
          polygon.forEach((ring) => addCountryRing(ring, outlineMaterial));
        });
      }
    }
    async function loadCountries() {
      try {
        const response = await fetch("https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson");
        if (!response.ok) return;
        const geojson = await response.json();
        const outlineMaterial = new THREE.LineBasicMaterial({
          color: primaryColor,
          transparent: true,
          opacity: 0.82,
          depthWrite: false,
          blending: THREE.NormalBlending
        });
        const fillMaterial = new THREE.MeshBasicMaterial({
          color: primaryColor,
          transparent: true,
          opacity: 0.16,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.NormalBlending
        });
        (geojson.features || []).forEach((feature) => drawCountryGeometry(feature.geometry, outlineMaterial, fillMaterial));
      } catch {}
    }
    function pickBeamTarget(excludeName) {
      let target = beamTargets[Math.floor(Math.random() * beamTargets.length)];
      if (excludeName && beamTargets.length > 1) {
        while (target.name === excludeName) {
          target = beamTargets[Math.floor(Math.random() * beamTargets.length)];
        }
      }
      const jitterLon = (Math.random() - 0.5) * target.jitter;
      const jitterLat = (Math.random() - 0.5) * target.jitter * 0.72;
      return {
        name: target.name,
        point: lonLatToVector(target.lon + jitterLon, target.lat + jitterLat, 1.012)
      };
    }
    function pickBeamPair() {
      let bestPair = null;
      let bestAngle = Infinity;
      for (let attempt = 0; attempt < 24; attempt++) {
        const start = pickBeamTarget();
        const end = pickBeamTarget(start.name);
        const angle = start.point.clone().normalize().angleTo(end.point.clone().normalize());
        if (angle <= maxBeamAngle) return { start, end, angle };
        if (angle < bestAngle) {
          bestPair = { start, end, angle };
          bestAngle = angle;
        }
      }
      return bestPair;
    }
    function makeShotPoints(start, end) {
      const points = [];
      const startNormal = start.clone().normalize();
      const endNormal = end.clone().normalize();
      const angle = Math.min(maxBeamAngle, startNormal.angleTo(endNormal));
      const segments = Math.max(52, Math.ceil(angle * 42));
      const sinAngle = Math.sin(angle);
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        let point;
        if (sinAngle < 0.001) {
          point = startNormal.clone().lerp(endNormal, t);
        } else {
          point = startNormal.clone()
            .multiplyScalar(Math.sin((1 - t) * angle) / sinAngle)
            .add(endNormal.clone().multiplyScalar(Math.sin(t * angle) / sinAngle));
        }
        point.normalize().multiplyScalar(1.012 + Math.sin(t * Math.PI) * 0.26);
        points.push(point);
      }
      return points;
    }
    function spawnShot() {
      const { start, end } = pickBeamPair();
      const points = makeShotPoints(start.point, end.point);
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      geometry.setDrawRange(0, 1);
      const lineMaterialShot = new THREE.LineBasicMaterial({
        color: primaryColor,
        transparent: true,
        opacity: 0.78,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const line = new THREE.Line(geometry, lineMaterialShot);
      shotLayer.add(line);
      activeShots.push({ line, points, age: 0, duration: 2.85 + Math.random() * 0.75, from: start.name, to: end.name });
    }
    function updateShots(delta) {
      for (let i = activeShots.length - 1; i >= 0; i--) {
        const shot = activeShots[i];
        shot.age += delta;
        const progress = Math.min(1, shot.age / shot.duration);
        const pointIndex = Math.max(1, Math.floor(progress * (shot.points.length - 1)));
        shot.line.geometry.setDrawRange(0, pointIndex + 1);
        shot.line.material.opacity = 0.78 * (1 - Math.max(0, progress - 0.72) / 0.28);
        if (shot.age > shot.duration + 0.12) {
          shotLayer.remove(shot.line);
          shot.line.geometry.dispose();
          shot.line.material.dispose();
          activeShots.splice(i, 1);
        }
      }
    }
    const dotMaterial = new THREE.PointsMaterial({
      size: 0.0068,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.52,
      blending: THREE.AdditiveBlending
    });
    const starMaterial = new THREE.PointsMaterial({
      size: 0.012,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.07,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const starfield = new THREE.Points(makeStarfield(190), starMaterial);
    scene.add(starfield);
    globe.add(new THREE.Points(makePoints(11800, 1, 0.009), dotMaterial));
    const lineMaterial = new THREE.LineBasicMaterial({ color: primaryColor, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending });
    [-0.72, -0.5, -0.25, 0, 0.25, 0.5, 0.72].forEach((y) => globe.add(new THREE.Line(makeLatitude(y), lineMaterial)));
    Array.from({ length: 12 }, (_, index) => (index / 12) * Math.PI).forEach((angle) => globe.add(new THREE.Line(makeMeridian(angle), lineMaterial)));
    const aura = new THREE.Mesh(
      new THREE.SphereGeometry(1.06, 48, 24),
      new THREE.MeshBasicMaterial({ color: primaryColor, wireframe: true, transparent: true, opacity: 0.055 })
    );
    globe.add(aura);
    const successRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.18, 0.006, 8, 160),
      new THREE.MeshBasicMaterial({ color: primaryColor, transparent: true, opacity: 0, blending: THREE.AdditiveBlending })
    );
    scene.add(successRing);
    window.__loadingPreviewDebug = () => ({
      countryLines: countryLayer.children.length,
      activeShots: activeShots.length,
      beamTargets: beamTargets.map((target) => target.name),
      shots: activeShots.map((shot) => `${shot.from} -> ${shot.to}`),
      speed: state.speed,
      targetSpeed: state.targetSpeed,
      loaded: state.loaded
    });
    loadCountries();

    function resize() {
      renderer.setSize(stage.clientWidth, stage.clientHeight);
      camera.aspect = stage.clientWidth / stage.clientHeight;
      camera.updateProjectionMatrix();
    }
    function setActive(action) {
      document.querySelectorAll("button[data-action]").forEach((button) => button.classList.toggle("active", button.dataset.action === action));
    }
    function resetFlow() {
      state.loaded = false;
      state.targetSpeed = 1;
      state.authPulse = 0;
      stage.className = "";
      document.getElementById("copyStack").classList.remove("hide");
      document.getElementById("fade").classList.remove("black");
      document.getElementById("splash").classList.remove("reveal");
      document.getElementById("app-shell").classList.remove("ready");
      camera.position.z = 4.3;
      setActive("idle");
    }
    function authPulse() {
      state.authPulse = 1;
      state.targetSpeed = 2;
      setActive("auth");
      window.setTimeout(() => {
        if (!state.loaded) {
          state.targetSpeed = 1;
          setActive("idle");
        }
      }, 1350);
    }
    function loadedFlow() {
      state.loaded = true;
      state.targetSpeed = 1.6;
      setActive("loaded");
      stage.classList.add("zoom");
      document.getElementById("copyStack").classList.add("hide");
      window.setTimeout(() => document.getElementById("fade").classList.add("black"), 950);
      window.setTimeout(() => stage.classList.add("dim"), 1180);
      window.setTimeout(() => document.getElementById("app-shell").classList.add("ready"), 1540);
      window.setTimeout(() => document.getElementById("splash").classList.add("reveal"), 1760);
      window.setTimeout(() => document.getElementById("fade").classList.remove("black"), 1820);
    }
    function replayFlow() {
      resetFlow();
      window.setTimeout(authPulse, 520);
      window.setTimeout(loadedFlow, 2100);
    }
    function tickText(now) {
      const greeting = greetings[Math.floor(now / 3200) % greetings.length];
      const phrase = phrases[Math.floor(now / 1500) % phrases.length];
      document.getElementById("greeting").textContent = greeting;
      document.getElementById("mockGreeting").textContent = greeting;
      document.getElementById("phrase").textContent = phrase;
    }
    function animate(now) {
      const elapsed = (now - state.start) / 1000;
      const delta = Math.min(0.05, (now - state.previous) / 1000);
      state.previous = now;
      state.speed += (state.targetSpeed - state.speed) * 0.055;
      state.authPulse = Math.max(0, state.authPulse - 0.018);
      if (elapsed > state.nextShot && !state.loaded) {
        spawnShot();
        state.nextShot = elapsed + 2.1 + Math.random() * 2.1;
      }
      updateShots(delta);
      const starPhase = (elapsed % 7.5) / 7.5;
      const shimmer = starPhase < 0.2 ? Math.sin((starPhase / 0.2) * Math.PI) : 0;
      starMaterial.opacity = 0.065 + shimmer * 0.105;
      starMaterial.size = 0.011 + shimmer * 0.004;
      starfield.rotation.z += 0.00008;
      globe.rotation.y += 0.0028 * state.speed;
      globe.rotation.x = Math.sin(elapsed * 0.35) * 0.045;
      aura.rotation.z -= 0.0012 * state.speed;
      successRing.material.opacity = state.authPulse * 0.42;
      successRing.scale.setScalar(1 + (1 - state.authPulse) * 0.16);
      camera.position.z += ((state.loaded ? 2.05 : 4.3) - camera.position.z) * 0.028;
      tickText(now);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    document.getElementById("braille").innerHTML = Array.from({ length: 24 }, (_, index) => {
      const row = Math.floor(index / 12);
      const column = index % 12;
      const lead = column % 2 === 0 ? row : 1 - row;
      return `<i style="--delay:${column * 180 + lead * 95}ms"></i>`;
    }).join("");
    document.querySelector("[data-action='idle']").addEventListener("click", resetFlow);
    document.querySelector("[data-action='auth']").addEventListener("click", authPulse);
    document.querySelector("[data-action='loaded']").addEventListener("click", loadedFlow);
    document.querySelector("[data-action='replay']").addEventListener("click", replayFlow);
    window.addEventListener("resize", resize);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
