# [claude-code 2026-04-19] S27-T2 W1b — Hermes runtime config.
# See https://hermes-agent.nousresearch.com/docs/ for field reference.

runtime:
  host: 0.0.0.0
  port: 8318
  log_level: info

context:
  # Default engine — hermes-lcm DAG with lcm_grep/lcm_describe/lcm_expand tools.
  # Override per-conversation via X-Context-Engine header or conversations.context_engine column.
  engine: lcm
  budget_tokens: 120000

plugins:
  preload:
    - hermes-lcm
    - icarus-plugin
  # T11 (Claude-10) drops GEPA + DSPy here during Wave 2.
  optional:
    - gepa

routing:
  # T9 owns the live model map. Defaults here are the fallback when sidecar is queried
  # before Claude-10 populates the routing table.
  default_model: claude-sonnet-4-6
  per_agent:
    harper: claude-opus-4-7
    oracle: claude-opus-4-7
    feucht: claude-haiku-4-5
    consul: claude-sonnet-4-6
    herald: claude-haiku-4-5

voice:
  # [claude-code 2026-04-19] S27-T5 W2c — real voicebox + Qwen wired through the sidecar.
  # Reasoning model for the voice CAO lives in ROUTING_TABLE (routing.ts) under
  # agent=harper-voice. Swap via ROUTING_OVERRIDE_HARPER_VOICE env var.
  agent_id: harper-voice
  reasoning_model: qwen/qwen3.6-plus-preview:free
  stt:
    primary:
      provider: whisper-turbo
      model: whisper-turbo
      # Base64 audio in, {transcript, words[]} out via POST /v1/voice/stt.
    fallback:
      provider: qwen-stt
      model: qwen-audio-stt
      enabled_via_env: VOICE_STT_USE_QWEN
  tts:
    provider: voicebox
    model: qwen3-tts
    voice_id: harper-voice
    # Streams opus audio chunks; client side decodes as they arrive.
    stream: true
    target_first_byte_ms: 400
  greeting:
    # System prompt used by POST /v1/chat when the frontend opens a new voice session.
    # Stays terse so the <2s end-of-speech → first-audio budget survives.
    system_prompt: |
      The user just opened the voice assistant. Give a 1-sentence greeting
      (max 12 words) and wait for their question. Do not begin analysis.
      Harper-voiced: confident, terse, data-first.

skills:
  # T10 (Claude-10) registers agentskills.io manifests. Empty until then.
  registry: []

auth:
  # Internal-only. backend-hono signs; sidecar verifies.
  jwt_env: INTERNAL_HERMES_JWT
  algorithm: HS256

observability:
  emit_context_view_events: true
