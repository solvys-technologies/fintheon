# [claude-code 2026-04-19] Fly.io config for fintheon-hermes sidecar.
# Internal networking only — no public http_service. backend-hono reaches via 6PN.
app = 'fintheon-hermes'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8318"
  HERMES_LOG_LEVEL = "info"

[[services]]
  protocol = "tcp"
  internal_port = 8318
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 8318

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 4
  memory_mb = 4096

[experimental]
  auto_rollback = true

[deploy]
  strategy = "rolling"
