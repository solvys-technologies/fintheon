app = "fintheon-riskflow-worker"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.riskflow-worker"

[env]
  NODE_ENV = "production"
  RISKFLOW_WORKER_PORT = "8082"
  FLAG_RISKFLOW_WORKER_WRITES_RISKFLOW = "true"

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
