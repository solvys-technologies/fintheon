app = 'fintheon'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # 24/7 always-on: backend serves mobile PWA + desktop electron, both finished
  # surfaces. Idle-stop savings aren't worth the cold-start latency on first
  # request after a quiet stretch (~5s). Keep min_machines_running >= 1 and
  # disable proxy-driven autostop so capacity-based culling can't drop the
  # last machine. News worker has the same posture in fly.news-worker.toml.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
