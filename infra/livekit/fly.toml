app = "fintheon-livekit"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 7880
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80

[[services]]
  internal_port = 7881
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 7881

[[services]]
  internal_port = 5349
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 5349

[[services]]
  internal_port = 50000
  protocol = "udp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    start_port = 50000
    end_port = 50100
