<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Relay"><title>Relay</title><desc>Antipodal pairs ping around the perimeter.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-27-k 1800ms cubic-bezier(0.25, 1, 0.5, 1) infinite both;}@keyframes icon-27-k{0%{opacity:0;}8%{opacity:1;}36%{opacity:0.05;}100%{opacity:0;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d00,.d44{animation-delay:0ms;}.d02,.d42{animation-delay:900ms;}.d04,.d40{animation-delay:450ms;}.d20,.d24{animation-delay:1350ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d00" href="#l" x="6" y="6"/><use class="l d02" href="#l" x="28" y="6"/><use class="l d04" href="#l" x="50" y="6"/><use class="l d20" href="#l" x="6" y="28"/><use class="l d24" href="#l" x="50" y="28"/><use class="l d40" href="#l" x="6" y="50"/><use class="l d42" href="#l" x="28" y="50"/><use class="l d44" href="#l" x="50" y="50"/></svg>
