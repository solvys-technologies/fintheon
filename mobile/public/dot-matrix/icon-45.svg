<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Inner Twinkle"><title>Inner Twinkle</title><desc>The inner 3×3 cluster twinkles on its own deterministic loop.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-45-k 2400ms cubic-bezier(0.65, 0, 0.35, 1) infinite both;}@keyframes icon-45-k{0%{opacity:0.05;}40%{opacity:0.05;}50%{opacity:1;}60%{opacity:0.05;}100%{opacity:0.05;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d11{animation-delay:775ms;}.d12{animation-delay:2201ms;}.d13{animation-delay:1394ms;}.d21{animation-delay:2186ms;}.d22{animation-delay:2302ms;}.d23{animation-delay:1327ms;}.d31{animation-delay:1058ms;}.d32{animation-delay:142ms;}.d33{animation-delay:2158ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d11" href="#l" x="17" y="17"/><use class="l d12" href="#l" x="28" y="17"/><use class="l d13" href="#l" x="39" y="17"/><use class="l d21" href="#l" x="17" y="28"/><use class="l d22" href="#l" x="28" y="28"/><use class="l d23" href="#l" x="39" y="28"/><use class="l d31" href="#l" x="17" y="39"/><use class="l d32" href="#l" x="28" y="39"/><use class="l d33" href="#l" x="39" y="39"/></svg>
