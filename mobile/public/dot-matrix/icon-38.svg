<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Verify"><title>Verify</title><desc>A checkmark traces itself once and stays lit. One-shot.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-38-k 1400ms cubic-bezier(0.25, 1, 0.5, 1) 1 both;}@keyframes icon-38-k{0%{opacity:0;}5%{opacity:1;}30%{opacity:0.05;}80%{opacity:0.05;}100%{opacity:0.6;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d04{animation-delay:1200ms;}.d14{animation-delay:1000ms;}.d20{animation-delay:0ms;}.d24{animation-delay:800ms;}.d31{animation-delay:200ms;}.d33{animation-delay:600ms;}.d42{animation-delay:400ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d04" href="#l" x="50" y="6"/><use class="l d14" href="#l" x="50" y="17"/><use class="l d20" href="#l" x="6" y="28"/><use class="l d24" href="#l" x="50" y="28"/><use class="l d31" href="#l" x="17" y="39"/><use class="l d33" href="#l" x="39" y="39"/><use class="l d42" href="#l" x="28" y="50"/></svg>
