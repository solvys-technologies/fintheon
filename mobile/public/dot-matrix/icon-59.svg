<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" role="img" aria-label="Constellation"><title>Constellation</title><desc>Seven scattered dots twinkle slowly in a fixed pattern.</desc><defs><circle id="b" r="2.4" fill="#ffffff" opacity="0.07"/><circle id="l" r="3.1"/></defs><style>.l{fill:#ffffff;opacity:0;animation:icon-59-k 3000ms cubic-bezier(0.65, 0, 0.35, 1) infinite both;}@keyframes icon-59-k{0%{opacity:0.05;}40%{opacity:0.05;}50%{opacity:1;}60%{opacity:0.05;}100%{opacity:0.05;}}@media (prefers-reduced-motion:reduce){.l{animation:none;opacity:0.45;}}.d02{animation-delay:2361ms;}.d04{animation-delay:2997ms;}.d10{animation-delay:2439ms;}.d23{animation-delay:1563ms;}.d31{animation-delay:2217ms;}.d34{animation-delay:2301ms;}.d42{animation-delay:2091ms;}</style><use href="#b" x="6" y="6"/><use href="#b" x="17" y="6"/><use href="#b" x="28" y="6"/><use href="#b" x="39" y="6"/><use href="#b" x="50" y="6"/><use href="#b" x="6" y="17"/><use href="#b" x="17" y="17"/><use href="#b" x="28" y="17"/><use href="#b" x="39" y="17"/><use href="#b" x="50" y="17"/><use href="#b" x="6" y="28"/><use href="#b" x="17" y="28"/><use href="#b" x="28" y="28"/><use href="#b" x="39" y="28"/><use href="#b" x="50" y="28"/><use href="#b" x="6" y="39"/><use href="#b" x="17" y="39"/><use href="#b" x="28" y="39"/><use href="#b" x="39" y="39"/><use href="#b" x="50" y="39"/><use href="#b" x="6" y="50"/><use href="#b" x="17" y="50"/><use href="#b" x="28" y="50"/><use href="#b" x="39" y="50"/><use href="#b" x="50" y="50"/><use class="l d02" href="#l" x="28" y="6"/><use class="l d04" href="#l" x="50" y="6"/><use class="l d10" href="#l" x="6" y="17"/><use class="l d23" href="#l" x="39" y="28"/><use class="l d31" href="#l" x="17" y="39"/><use class="l d34" href="#l" x="50" y="39"/><use class="l d42" href="#l" x="28" y="50"/></svg>
